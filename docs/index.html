，而这支跨越时空的阵容，差一点就能点燃整个赛场。剑心犹在，明年再来。"},{w:8,t:"拿到奖金了，不亏。四强的成绩足以让你在任何Dota社群里抬起头来——你的选秀眼光，是经过TI正赛检验的。"},{w:6,t:"圣剑掉了可以再刷，高地没了可以再守。四强不是终点——你选的阵容里还有太多未兑现的天赋。下一个赛季，你会走得更远。"},{w:3,t:"你的BP纸上，画满了只有自己看得懂的箭头和圈。四强，是对这份认真最好的回报。虽然没能进决赛，但没有人能否认——你懂Dota。"},{w:1,t:'"Liquid are doing it!" 虽然没有拿到冠军，但你的选秀里有一个瞬间让所有观众都站了起来。四强，已是一个美丽的句号。'}],top8:[{w:10,t:"八强。淘汰赛的聚光灯下，你证明了自己的眼光。也许阵容的化学反应还需要一点磨合，也许只是签运差了一点——但这些名字，都值得被记住。"},{w:8,t:"八强的成绩不丢人。你选的阵容里有故事，有传奇，有那个让你爱上Dota的瞬间。回去看看录像，下一次的BP会更好。"},{w:6,t:'淘汰赛一轮游？不，这叫"积累了宝贵的TI淘汰赛经验"。你的每一位队员都有过属于自己的高光时刻，只是这次没能凑在一起。'},{w:2,t:"八强。一个让人既满足又不甘心的名次。满足是因为你已经超过了绝大多数人，不甘心是因为——你知道自己本可以走得更远。"}],group:[{w:10,t:"小组赛出线。你跨过了正赛的门槛，但征途才刚刚开始。没有人会记得小组赛的比分，但每个人都记得自己第一次看TI时的热血。"},{w:8,t:"你的选秀里有回忆，有青春，有那个通宵看比赛的自己。也许正赛的成绩不算耀眼，但这些名字在一起，就是你对Dota最深的理解。"},{w:6,t:"进了TI正赛，见到了隔壁的冠军战队，学到了很多，明年会更好——这份赛后采访发言，送给你。剑心犹在，传奇需要时间打磨。"},{w:3,t:"小组赛的每一场都是学习。你看着自己的阵容，想着如果再给你一次机会，你会选谁？没关系，机会永远在——Draft Again。"}],qualifier:[{w:10,t:"买活还在CD。别灰心——每一支TI冠军战队都曾在预选赛里挣扎过。再次鼓起丧失的勇气吧，下一场选秀，你依然是那个相信奇迹的少年。"},{w:8,t:"预选赛出局。这很痛，但Dota教会我们的一件事就是：输了就再来。你的选秀思路没有问题，只是这次运气不在你这边。"},{w:7,t:`"Don't give up!" 每一个Dota玩家都听过队友的这句话。预选赛的失败只是暂时的——下一局，你会有更好的Pick。`},{w:5,t:"也许你选的都是传奇。但传奇也需要正确的组合——五个核心不等于一支战队。回头看看你的阵容，找到那块缺失的拼图。再次鼓起丧失的勇气吧。"},{w:3,t:"剑已折断，但剑心犹在。预选赛的失败从来不是终点——TI历史上，多少冠军在成名前也曾倒在预选的门槛上。站起来，再选一次。"},{w:1,t:"你输了吗？不，你只是还没赢。Dota最美的部分，就是永远有下一场比赛。拿起鼠标，回到选秀界面——那个属于你的不朽盾，还在等你。"}]};function rn(e){const t=e.reduce((s,a)=>s+a.w,0);let n=Math.random()*t;for(const s of e)if(n-=s.w,n<=0)return s.t;return e[0].t}function rd(e){return e>=76?rn(on.champion):e>=71?rn(on.finalist):e>=66?rn(on.top4):e>=61?rn(on.top8):e>=56?rn(on.group):rn(on.qualifier)}function Cf({aiPicks:e}){return c.jsxs("div",{className:"bg-white/[0.02] border border-purple-500/20 rounded-2xl p-3",children:[c.jsxs("div",{className:"flex items-center gap-1.5 mb-2",children:[c.jsx(sd,{size:12,className:"text-purple-400"}),c.jsx("span",{className:"text-[9px] font-black text-purple-400/70 uppercase tracking-wider",children:"AI 对手阵容"})]}),c.jsxs("div",{className:"space-y-
